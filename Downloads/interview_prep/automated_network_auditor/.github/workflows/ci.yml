name: CI — Network Auditor

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint (Python + Bash)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install black flake8 mypy types-PyYAML

      - name: black — formatting check
        run: black --check --diff .

      - name: flake8 — style check
        run: flake8 . --max-line-length=100 --exclude=.venv,__pycache__

      - name: mypy — type check
        run: mypy auditor/ cli/ scripts/python/ --ignore-missing-imports

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck — Bash lint
        run: |
          find scripts/bash -name "*.sh" -print0 \
            | xargs -0 shellcheck --severity=warning

  # ── Job 2: Test ────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=auditor \
            --cov=scripts/python \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml

  # ── Job 3: Simulation smoke-test ──────────────────────────────────────────
  smoke:
    name: Simulation smoke-test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run audit in simulate mode
        run: |
          python -m cli.main audit --simulate --no-detail
        # Exit 1 is expected (SW1 + SRV2 deliberately fail)
        continue-on-error: true

      - name: Run audit and save JSON report
        run: |
          python -m cli.main audit --simulate --no-detail --output /tmp/audit_report.json
          python -c "import json; d=json.load(open('/tmp/audit_report.json')); print(f'Devices: {d[\"devices_audited\"]}, Compliance: {d[\"overall_compliance_pct\"]}%')"
        continue-on-error: true

      - name: Commission dry-run
        run: python scripts/python/commission.py

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report
          path: /tmp/audit_report.json
